<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Alert — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f4f6;
      color: #111;
      padding: 32px 24px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 32px; }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Table ──────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      text-align: left;
      padding: 8px 10px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      color: #555;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-green { background: #dcfce7; color: #16a34a; }
    .badge-gray  { background: #f3f4f6; color: #6b7280; }
    .badge-blue  { background: #dbeafe; color: #1d4ed8; }

    /* ── Buttons ────────────────────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: #1d72e8; color: #fff; }
    .btn-danger   { background: #fee2e2; color: #dc2626; }
    .btn-warning  { background: #fef3c7; color: #92400e; }
    .btn-gray     { background: #f3f4f6; color: #374151; }
    .btn-green    { background: #dcfce7; color: #166534; }
    .btn-purple   { background: #ede9fe; color: #6d28d9; }

    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }

    /* ── Form ───────────────────────────────────────────────────────── */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    label { font-size: 0.8rem; font-weight: 600; color: #555; }
    input[type="text"], input[type="tel"] {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }
    input:focus { border-color: #1d72e8; box-shadow: 0 0 0 2px rgba(29,114,232,0.15); }
    .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 0.88rem; padding-bottom: 2px; }

    /* ── Toast ──────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a1a;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      max-width: 320px;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: #dc2626; }

    /* ── Top action bar ─────────────────────────────────────────────── */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

    .url-cell { font-family: monospace; font-size: 0.78rem; color: #555; max-width: 200px;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<h1>🌩 Weather Alert Admin</h1>
<p class="subtitle">Manage users, tokens, and alerts.</p>

<!-- ── Users table ─────────────────────────────────────────────────── -->
<div class="card">
  <div class="card-title">
    <span>Users</span>
    <button class="btn btn-primary" onclick="runCheck()">⚡ Run Weather Check Now</button>
  </div>
  <table id="user-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Role</th>
        <th>Last Location</th>
        <th>Last Alert</th>
        <th>User URL</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="user-tbody">
      <tr><td colspan="8" style="text-align:center;color:#999;padding:24px;">Loading…</td></tr>
    </tbody>
  </table>
</div>

<!-- ── Add user form ───────────────────────────────────────────────── -->
<div class="card">
  <div class="card-title">Add User</div>
  <form onsubmit="addUser(event)">
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="new-name" placeholder="Mom" required />
      </div>
      <div class="form-group">
        <label>Phone (E.164)</label>
        <input type="tel" id="new-phone" placeholder="+15555551234" required />
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <div class="checkbox-row">
          <input type="checkbox" id="new-admin" />
          <label for="new-admin" style="margin:0;">Admin</label>
        </div>
      </div>
      <div class="form-group" style="justify-content:flex-end;flex:0;">
        <button type="submit" class="btn btn-primary">Add User</button>
      </div>
    </div>
  </form>
</div>

<div id="toast"></div>

<script>
const BASE = window.location.origin; // same origin — admin is served by Flask

// ── Load users ────────────────────────────────────────────────────────────────
async function loadUsers() {
  const res = await fetchAdmin('/admin/users');
  if (!res.ok) { showToast('Failed to load users', true); return; }
  const users = await res.json();
  renderTable(users);
}

function renderTable(users) {
  const tbody = document.getElementById('user-tbody');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:24px;">No users yet.</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => {
    const loc   = u.last_location;
    const locTxt = loc
      ? `${loc.city_state || `${loc.lat.toFixed(2)},${loc.lon.toFixed(2)}`}<br><small style="color:#999">${timeAgo(loc.timestamp)}</small>`
      : '<span style="color:#ccc">—</span>';
    const alertTxt = u.last_alert_sent_at
      ? timeAgo(u.last_alert_sent_at)
      : '<span style="color:#ccc">—</span>';
    const userUrl = `${window.location.protocol}//${window.location.hostname.replace('api.', 'www.')}` +
                    `/weather/u/${u.access_token}`;

    return `<tr id="row-${u.id}">
      <td><strong>${esc(u.name)}</strong></td>
      <td>${esc(u.phone_number)}</td>
      <td><span class="badge ${u.is_active ? 'badge-green' : 'badge-gray'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
      <td>${u.is_admin ? '<span class="badge badge-blue">Admin</span>' : ''}</td>
      <td>${locTxt}</td>
      <td>${alertTxt}</td>
      <td class="url-cell" title="${userUrl}">${userUrl}</td>
      <td>
        <div class="btn-group">
          <button class="btn btn-gray" onclick="copyUrl('${userUrl}')">📋 Copy URL</button>
          <button class="btn btn-green" onclick="testSms(${u.id}, '${esc(u.name)}')">📱 Test SMS</button>
          <button class="btn btn-purple" onclick="regenToken(${u.id}, '${esc(u.name)}')">🔑 New Token</button>
          <button class="btn btn-warning" onclick="toggleActive(${u.id}, ${u.is_active}, '${esc(u.name)}')">${u.is_active ? '⏸ Deactivate' : '▶ Activate'}</button>
          <button class="btn btn-danger" onclick="deleteUser(${u.id}, '${esc(u.name)}')">🗑 Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function addUser(e) {
  e.preventDefault();
  const name    = document.getElementById('new-name').value.trim();
  const phone   = document.getElementById('new-phone').value.trim();
  const isAdmin = document.getElementById('new-admin').checked;

  const res = await fetchAdmin('/admin/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, phone_number: phone, is_admin: isAdmin }),
  });
  const data = await res.json();
  if (res.ok) {
    showToast(`✅ ${name} added`);
    document.getElementById('new-name').value  = '';
    document.getElementById('new-phone').value = '';
    document.getElementById('new-admin').checked = false;
    loadUsers();
  } else {
    showToast(data.error || 'Failed to add user', true);
  }
}

async function deleteUser(id, name) {
  if (!confirm(`Delete ${name}? This removes all their location history.`)) return;
  const res = await fetchAdmin(`/admin/users/${id}`, { method: 'DELETE' });
  if (res.ok) { showToast(`🗑 ${name} deleted`); loadUsers(); }
  else showToast('Delete failed', true);
}

async function toggleActive(id, current, name) {
  const res = await fetchAdmin(`/admin/users/${id}/toggle-active`, { method: 'PATCH' });
  const data = await res.json();
  if (res.ok) {
    showToast(`${data.is_active ? '▶ Activated' : '⏸ Deactivated'}: ${name}`);
    loadUsers();
  } else showToast('Toggle failed', true);
}

async function regenToken(id, name) {
  if (!confirm(`Generate a new URL token for ${name}? Their old link will stop working.`)) return;
  const res  = await fetchAdmin(`/admin/users/${id}/regenerate-token`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) { showToast(`🔑 New token generated for ${name}`); loadUsers(); }
  else showToast('Token regen failed', true);
}

async function testSms(id, name) {
  showToast(`📱 Sending test SMS to ${name}…`);
  const res  = await fetchAdmin(`/admin/users/${id}/test-sms`, { method: 'POST' });
  const data = await res.json();
  if (res.ok && data.status === 'sent') showToast(`✅ Test SMS sent to ${name}`);
  else showToast(`SMS failed for ${name} — check server logs`, true);
}

async function runCheck() {
  showToast('⚡ Running weather check…');
  const res  = await fetchAdmin('/admin/trigger-check', { method: 'POST' });
  const data = await res.json();
  if (res.ok) showToast(`✅ ${data.message}`);
  else showToast('Check failed — see server logs', true);
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => showToast('📋 URL copied to clipboard'));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fetchAdmin(path, opts = {}) {
  // Browser re-uses the Basic Auth credentials entered at first prompt
  return fetch(BASE + path, opts);
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent  = msg;
  t.className    = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Math.floor((Date.now() - new Date(iso + (iso.endsWith('Z') ? '' : 'Z'))) / 1000);
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadUsers();
</script>
</body>
</html>
